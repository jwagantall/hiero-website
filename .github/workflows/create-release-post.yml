name: Create website post from GitHub release

on:
  workflow_dispatch:
    inputs:
      release_url:
        description: "GitHub release URL (e.g. https://github.com/hiero-ledger/hiero-sdk-java/releases/tag/v2.68.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out hiero-website
        uses: actions/checkout@v4

      - name: Parse release URL and fetch release data
        id: release
        env:
          RELEASE_URL: ${{ github.event.inputs.release_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request

          release_url = os.environ["RELEASE_URL"].strip()

          m = re.match(
              r"^https://github\.com/([^/]+)/([^/]+)/releases/tag/(.+)$",
              release_url
          )
          if not m:
              print("Invalid GitHub release URL format", file=sys.stderr)
              sys.exit(1)

          owner, repo, tag = m.group(1), m.group(2), m.group(3)

          api_url = f"https://api.github.com/repos/{owner}/{repo}/releases/tags/{tag}"
          req = urllib.request.Request(
              api_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "User-Agent": "github-actions"
              }
          )

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read().decode("utf-8"))

          def gha_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"{name}<<EOF\n{value}\nEOF\n")

          gha_output("owner", owner)
          gha_output("repo", repo)
          gha_output("tag", tag)
          gha_output("release_name", data.get("name") or tag)
          gha_output("published_at", data.get("published_at") or "")
          gha_output("body", data.get("body") or "")
          gha_output("html_url", data.get("html_url") or release_url)
          gha_output("author_login", (data.get("author") or {}).get("login", "hiero-team"))
          PY

      - name: Generate blog post
        id: generate
        env:
          OWNER: ${{ steps.release.outputs.owner }}
          REPO: ${{ steps.release.outputs.repo }}
          TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
          BODY: ${{ steps.release.outputs.body }}
          HTML_URL: ${{ steps.release.outputs.html_url }}
          AUTHOR_LOGIN: ${{ steps.release.outputs.author_login }}
        run: |
          python <<'PY'
          import os
          import re
          from datetime import datetime, timezone

          owner = os.environ["OWNER"]
          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          release_name = os.environ["RELEASE_NAME"].strip()
          published_at = os.environ["PUBLISHED_AT"].strip()
          body = os.environ["BODY"]
          html_url = os.environ["HTML_URL"].strip()
          author_login = os.environ["AUTHOR_LOGIN"].strip()

          slug_repo = repo.lower().replace("_", "-")
          slug_tag = tag.lower().replace("/", "-")
          filename = f"{slug_repo}-{slug_tag}-release.md"
          filepath = os.path.join("content", "posts", filename)

          title_repo = repo.replace("-", " ").title()
          title = f"{title_repo} – Announcing Release {tag}"

          abstract = f"The {title_repo} project has a new release: {tag}."

          # Convert ISO timestamp from GitHub into format similar to existing website post
          dt = datetime.fromisoformat(published_at.replace("Z", "+00:00"))
          dt = dt.astimezone(timezone.utc)

          content = f'''+++
title = "{title}"
date = {dt.strftime("%Y-%m-%dT%H:%M:%S+00:00")}
categories = ["Blog"]
abstract = "{abstract}"
[[authors]]
name = "{author_login}"
organization = "Hiero Team"
+++

We’re excited to share a new release for **{repo}**.

* * *

## Latest Release: {release_name}

- **Repository:** `{owner}/{repo}`
- **Version:** `{tag}`
- **Published:** {dt.strftime("%B %d, %Y")}
- **Release URL:** [{html_url}]({html_url})

## Release Notes

{body if body.strip() else "No release notes were provided in the GitHub release."}

* * *

For the complete details, see the original GitHub release: [{release_name}]({html_url})
'''

          os.makedirs(os.path.dirname(filepath), exist_ok=True)
          with open(filepath, "w", encoding="utf-8") as f:
              f.write(content)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"filepath={filepath}\n")
              fh.write(f"filename={filename}\n")
          PY

      - name: Create branch
        id: branch
        run: |
          BRANCH="release-post/${{ steps.release.outputs.repo }}-${{ steps.release.outputs.tag }}"
          BRANCH_CLEAN=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9/_-]#-#g')
          echo "branch=$BRANCH_CLEAN" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH_CLEAN"

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.generate.outputs.filepath }}"
          git commit -m "Add release post for ${{ steps.release.outputs.repo }} ${{ steps.release.outputs.tag }}"

      - name: Push branch
        run: |
          git push --set-upstream origin "${{ steps.branch.outputs.branch }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add release post for ${{ steps.release.outputs.repo }} ${{ steps.release.outputs.tag }}" \
            --body "This PR was automatically generated from the GitHub release:

${{ github.event.inputs.release_url }}

It creates a new blog post using the release notes from the upstream release." \
            --base main \
            --head "${{ steps.branch.outputs.branch }}"
